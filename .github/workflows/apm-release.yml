# apm (stm32h755 manager) release. tag apm/vX.Y.Z to build the firmware, wrap it
# into an updatable .smup, and publish a github release with the asset attached.

name: apm-release

on:
  push:
    tags: ['apm/v*']

permissions:
  contents: write # required for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install toolchain
        run: sudo apt-get update -qq &&
             sudo apt-get install -y -qq gcc-arm-none-eabi cmake make g++
      - name: build
        run: cmake -S modules/apm -B modules/apm/build &&
             cmake --build modules/apm/build -j"$(nproc)"
      - name: package .smup
        run: |
          set -e
          mkdir -p dist
          make -C tools/fw_update mkupdate
          arm-none-eabi-objcopy -O binary \
            modules/apm/build/audio_peripheral_module.elf dist/audio_peripheral_module.bin
          tools/fw_update/mkupdate.bin \
            dist/audio_peripheral_module.bin dist/audio_peripheral_module.smup APM
          test "$(od -An -tx1 -N4 dist/audio_peripheral_module.smup | tr -d ' ')" = "424c4d31"
          (cd dist && sha256sum audio_peripheral_module.smup > audio_peripheral_module.smup.sha256)
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/audio_peripheral_module.smup dist/audio_peripheral_module.smup.sha256 \
            --title "apm ${{ github.ref_name }}" \
            --notes "APM firmware update image (.smup). Flash with: update.bin --file <asset>. Requires a bootloader speaking the BLM1 image format."
