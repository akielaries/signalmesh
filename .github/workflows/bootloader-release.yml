# bootloader (golden image) release. tag bootloader/vX.Y.Z. assets are .hex/.bin
# for debugger flashing - the bootloader is NOT delivered over the update path.
#
# gated by the `bootloader-release` environment: a bad golden image bricks the
# board (no fallback for the fallback). configure required reviewers on that
# environment in repo settings to enforce manual approval.

name: bootloader-release

on:
  push:
    tags: ['bootloader/v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: bootloader-release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install toolchain
        run: sudo apt-get update -qq &&
             sudo apt-get install -y -qq gcc-arm-none-eabi cmake make
      - name: build
        run: cmake -S modules/bootloader -B modules/bootloader/build &&
             cmake --build modules/bootloader/build -j"$(nproc)"
      - name: package .hex/.bin
        run: |
          set -e
          mkdir -p dist
          B=modules/bootloader/build/signalmesh_bootloader
          arm-none-eabi-objcopy -O binary "$B.elf" dist/signalmesh_bootloader.bin
          arm-none-eabi-objcopy -O ihex   "$B.elf" dist/signalmesh_bootloader.hex
          (cd dist && sha256sum signalmesh_bootloader.bin signalmesh_bootloader.hex > bootloader.sha256)
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/signalmesh_bootloader.hex dist/signalmesh_bootloader.bin dist/bootloader.sha256 \
            --title "bootloader ${{ github.ref_name }}" \
            --notes "Golden bootloader image. Flash with a debugger (ST-Link) to 0x08000000. Not delivered over the update path."
