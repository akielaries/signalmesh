# apm (stm32h755 manager) version history. newest entry FIRST - its version drives
# the boot banner and, on push to main, is auto-released as tag apm/v<version>
# (see .github/workflows/release.yml). bump the version + add notes to cut a
# release; leave it unchanged and nothing happens.
releases:
  - version: 1.0.0
    notes:
      - initial APM release
      - versioned boot banner (git hash + dirty flag)
